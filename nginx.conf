server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Astro builds directory-style routes (/path/index.html).
    # Try the file, then the directory index, then fall back to 404.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long-cache fingerprinted build assets and static media.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|png|jpe?g|gif|svg|webp|avif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Astro emits 404.html for unmatched routes.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;
}
